{% extends 'main.html' %}

{% block content %}

<h2>Update Booking </h2>

<h3>{{ data.flight.flight_name }}</h3>
<p>{{ data.flight.from_city }} → {{ data.flight.to_city }}</p>
<p>Price: {{ data.flight.price }}</p>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="passenger_name" value="{{ data.passenger_name }}" required><br><br>

    <input type="email" name="email" value="{{ data.email }}" required><br><br>

    <input type="text" name="phone_no" value="{{ data.phone_no }}" required><br><br>

    <input type="text" name="adhar_no" value="{{ data.adhar_no }}" required><br><br>

    <input type="number" name="age" value="{{ data.age }}" required><br><br>

    <select name="seat_class">
        <option value="Economy" {% if data.seat_class == "Economy" %}selected{% endif %}>Economy</option>
        <option value="Business" {% if data.seat_class == "Business" %}selected{% endif %}>Business</option>
        <option value="First Class" {% if data.seat_class == "First Class" %}selected{% endif %}>First Class</option>
    </select><br><br>

    <input type="text" name="seat_no" value="{{ data.seat_no }}" required><br><br>

    <button type="submit">Update Booking</button>
</form>

{% endblock %}
