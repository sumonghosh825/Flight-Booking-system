{% extends 'main.html' %}

{% block content %}
<h1>PROFILE PAGE</h1>
<center>
    <h1>
        {{request.user}} <br>
        Verification: {{request.user.is_authenticated}} <br>
        First Name:{{request.user.first_name}} <br>
        Last Name:{{request.user.last_name}} <br>
        Email: {{request.user.email}}<br>
        Username:{{request.user.username}} <br>
        <a href="{% url 'reset_pass' %}">RESET PASSWORD</a>
    </h1>
</center>
{% endblock %}
